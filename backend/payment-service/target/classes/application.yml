server:
  port: ${SERVER_PORT:8085}
spring:
  application:
    name: payment-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/payment_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
app:
  razorpay:
    key-id : rzp_test_SPYwU6OfKGPxzT
#    key-id: ${RAZORPAY_KEY_ID:rzp_test_mock}
#    key-secret: ${RAZORPAY_KEY_SECRET:mocksecret}
    key-secret: N2fqy1v6NCbZJlTiYlzBAbk9
  jwt:
    secret: F0Scb9Y3lMsGuROgwWiLfsQWJRNXd1yTMy+XCAgETw=
management:
  endpoints:
    web:
      exposure:
        include: health,info
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 10
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    instance-id: payment-service:${server.port}