eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
spring:
  redis:
    host: localhost
    port: 6379
    timeout: 60000

    globalcors:
      corsConfigurations:
        '[/**]':
          allowedOrigins:
            - "http://localhost:5173"
            - "https://foodrush.app"
          allowedMethods: [ "GET","POST","PUT","PATCH","DELETE","OPTIONS" ]
          allowedHeaders: [ "*" ]
          allowCredentials: true

      loadbalancer:
        ribbon:
          enabled: false