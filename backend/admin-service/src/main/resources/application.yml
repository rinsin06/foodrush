server:
  port: ${SERVER_PORT:8086}

spring:
  application:
    name: admin-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/authservice?useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 10
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    instance-id: ${spring.application.name}:${server.port}

app:
  jwt:
    secret: F0Scb9Y3lMsGuROgwWiLfsQWJRNXd1yTMy+XCAgETw=
  services:
    auth-url: ${AUTH_SERVICE_URL:http://localhost:8082}
    restaurant-url: ${RESTAURANT_SERVICE_URL:http://localhost:8083}
    order-url: ${ORDER_SERVICE_URL:http://localhost:8084}
    payment-url: ${PAYMENT_SERVICE_URL:http://localhost:8085}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.foodrush.admin: DEBUG
