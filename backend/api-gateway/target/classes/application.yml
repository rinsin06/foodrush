server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "https://foodrush.app"
            allowedMethods: ["GET","POST","PUT","PATCH","DELETE","OPTIONS"]
            allowedHeaders: ["*"]
            allowCredentials: true
      routes:
        # Public auth endpoints — no filter
        - id: auth-service-public
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/login,/api/v1/auth/register,/api/v1/auth/refresh

        # Protected auth endpoints — needs X-User-Id injected
        - id: auth-service-protected
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/addresses/**,/api/v1/auth/profile/**
          filters:
            - name: AuthenticationFilter

        # Keep existing auth route as fallback
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**

        - id: restaurant-service
          uri: lb://restaurant-service
          predicates:
            - Path=/api/v1/restaurants/**
          filters:
            - name: AuthenticationFilter

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/v1/orders/**,/api/v1/coupons/**
          filters:
            - name: AuthenticationFilter


        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - name: AuthenticationFilter

        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/api/v1/admin/**
          filters:
            - name: AuthenticationFilter

        - id: chatbot
          uri: forward:/
          predicates:
            - Path=/api/v1/chatbot/**

    loadbalancer:
      ribbon:
        enabled: false

anthropic:
  api:
    key: ${ANTHROPIC_API_KEY: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}

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 10
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    instance-id: ${spring.application.name}:${server.port}

app:
  jwt:
    secret: F0Scb9Y3lMsGuROgwWiLfsQWJRNXd1yTMy+XCAgETw=

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.netflix.discovery: DEBUG
    org.springframework.cloud.netflix: DEBUG