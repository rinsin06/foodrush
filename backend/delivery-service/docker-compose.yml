version: '3.8'

services:

  delivery-db:
    image: mysql:8.0
    container_name: delivery-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: delivery_db
    ports:
      - "3311:3306"
    volumes:
      - delivery_db_data:/var/lib/mysql
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - delivery-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  delivery-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: delivery-service
    restart: unless-stopped
    ports:
      - "8087:8087"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://delivery-db:3306/delivery_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://host.docker.internal:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=host.docker.internal:9092
      - SERVER_PORT=8087
    depends_on:
      delivery-db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - delivery-net

networks:
  delivery-net:
    driver: bridge

volumes:
  delivery_db_data:
